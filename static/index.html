<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelGPT+ - AI Travel Planning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        .panel {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .tags-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .tag {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        
        .tag.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .day-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .day-header {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .day-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        .stat strong {
            color: #667eea;
        }
        
        .poi-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .poi-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .poi-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .poi-details h4 {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        
        .poi-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 4px 10px;
            background: #667eea;
            color: white;
            border-radius: 12px;
            font-size: 0.85em;
        }
        
        .poi-description {
            color: #666;
            line-height: 1.6;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .summary-item {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .summary-item .value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .summary-item .label {
            opacity: 0.9;
        }
        
        .export-btn {
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,255,255,0.3);
        }
        
        .error {
            background: #fee;
            border: 2px solid #fcc;
            border-radius: 8px;
            padding: 15px;
            color: #c00;
            margin-top: 15px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .poi-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 TravelGPT+</h1>
            <p>AI-Powered Travel Planning with Real OSM Routing</p>
        </div>
        
        <div class="main-content">
            <!-- Left Panel: Form -->
            <div class="panel">
                <h2>📝 Lập Lịch Trình</h2>
                
                <div class="form-group">
                    <label>🏙️ Thành phố</label>
                    <select id="city">
                        <option value="Hồ Chí Minh">Hồ Chí Minh</option>
                        <option value="Hà Nội">Hà Nội</option>
                        <option value="Đà Lạt">Đà Lạt</option>
                        <option value="Đà Nẵng">Đà Nẵng</option>
                        <option value="Huế">Huế</option>
                        <option value="Nha Trang">Nha Trang</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>📅 Số ngày</label>
                    <input type="number" id="days" value="2" min="1" max="14">
                </div>
                
                <div class="form-group">
                    <label>💰 Ngân sách/ngày (VND)</label>
                    <input type="number" id="budget" value="1500000" min="100000" step="100000">
                </div>
                
                <div class="form-group">
                    <label>🚶 Chịu đi bộ (km/ngày)</label>
                    <input type="number" id="walk" value="5" min="0.5" max="20" step="0.5">
                </div>
                
                <div class="form-group">
                    <label>🚗 Phương tiện</label>
                    <select id="transport">
                        <option value="xe máy/ô tô">Xe máy/Ô tô</option>
                        <option value="đi bộ">Đi bộ</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>🍽️ Ẩm thực</label>
                    <div class="tags-group" id="tasteTags">
                        <div class="tag active" data-value="Vietnamese">Vietnamese</div>
                        <div class="tag active" data-value="Cafe">Cafe</div>
                        <div class="tag" data-value="Japanese">Japanese</div>
                        <div class="tag" data-value="Italian">Italian</div>
                        <div class="tag" data-value="Seafood">Seafood</div>
                        <div class="tag" data-value="Vegetarian">Vegetarian</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🎯 Hoạt động</label>
                    <div class="tags-group" id="activityTags">
                        <div class="tag active" data-value="attraction">Attraction</div>
                        <div class="tag active" data-value="food">Food</div>
                        <div class="tag" data-value="park">Park</div>
                        <div class="tag" data-value="museum">Museum</div>
                        <div class="tag" data-value="shopping">Shopping</div>
                        <div class="tag" data-value="nightlife">Nightlife</div>
                    </div>
                </div>
                
                <button class="btn" id="generateBtn">🚀 Tạo Lịch Trình</button>
            </div>
            
            <!-- Right Panel: Results -->
            <div class="panel">
                <div id="loadingState" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <h3>Đang tạo lịch trình tuyệt vời cho bạn...</h3>
                    <p>Đang tối ưu tuyến đường với thuật toán Dijkstra...</p>
                </div>
                
                <div id="resultsContainer" class="results">
                    <!-- Results will be inserted here -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        
        // Tag selection
        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('active');
            });
        });
        
        // Get selected tags
        function getSelectedTags(containerId) {
            const container = document.getElementById(containerId);
            const activeTags = container.querySelectorAll('.tag.active');
            return Array.from(activeTags).map(tag => tag.dataset.value);
        }
        
        // Generate itinerary
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loadingState');
            const results = document.getElementById('resultsContainer');
            
            // Disable button
            btn.disabled = true;
            btn.textContent = '⏳ Đang xử lý...';
            
            // Show loading
            loading.style.display = 'block';
            results.classList.remove('show');
            
            try {
                const requestData = {
                    city: document.getElementById('city').value,
                    days: parseInt(document.getElementById('days').value),
                    budget_vnd: parseInt(document.getElementById('budget').value),
                    walk_tolerance_km: parseFloat(document.getElementById('walk').value),
                    transport: document.getElementById('transport').value,
                    taste_tags: getSelectedTags('tasteTags'),
                    activity_tags: getSelectedTags('activityTags'),
                    include_images: true,
                    include_navigation: true,
                    optimize_cost: false,
                    weather_aware: true
                };
                
                const response = await fetch(`${API_BASE}/api/itinerary/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                displayResults(data, requestData);
                
            } catch (error) {
                console.error('Error:', error);
                results.innerHTML = `
                    <div class="error">
                        <strong>❌ Lỗi:</strong> ${error.message}<br>
                        Vui lòng kiểm tra xem API server có đang chạy không (http://localhost:8000)
                    </div>
                `;
                results.classList.add('show');
            } finally {
                // Re-enable button
                btn.disabled = false;
                btn.textContent = '🚀 Tạo Lịch Trình';
                loading.style.display = 'none';
            }
        });
        
        function displayResults(data, request) {
            const container = document.getElementById('resultsContainer');
            const itinerary = data.itinerary;
            const metadata = data.metadata;
            
            let html = `<h2>✨ Lịch Trình ${request.city}</h2>`;
            
            // Weather info
            if (metadata.weather) {
                html += `
                    <div style="background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #ffc107;">
                        <strong>⛅ Thời tiết:</strong> ${metadata.weather.description}, ${metadata.weather.temp}°C
                    </div>
                `;
            }
            
            // Daily itinerary
            itinerary.days.forEach((day, idx) => {
                html += `
                    <div class="day-card">
                        <div class="day-header">
                            📍 Ngày ${idx + 1}
                        </div>
                        <div class="day-stats">
                            <div class="stat"><strong>Quãng đường:</strong> ${day.distance_km} km</div>
                            <div class="stat"><strong>Số điểm:</strong> ${day.order.length}</div>
                            ${day.total_cost_vnd ? `<div class="stat"><strong>Chi phí:</strong> ${day.total_cost_vnd.toLocaleString()}đ</div>` : ''}
                        </div>
                `;
                
                day.order.forEach((poi, poiIdx) => {
                    html += `
                        <div class="poi-item">
                            <img src="${poi.image_url || 'https://via.placeholder.com/200x150/667eea/FFFFFF?text=No+Image'}" 
                                 alt="${poi.name}" 
                                 class="poi-image"
                                 onerror="this.src='https://via.placeholder.com/200x150/667eea/FFFFFF?text=No+Image'">
                            <div class="poi-details">
                                <h4>${poiIdx + 1}. ${poi.name}</h4>
                                <div class="poi-meta">
                                    <span class="badge">${poi.category}</span>
                                    <span class="badge">💰 ${poi.avg_cost.toLocaleString()}đ</span>
                                    <span class="badge">⭐ ${poi.final.toFixed(2)}</span>
                                </div>
                                <p class="poi-description">${poi.description}</p>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });
            
            // Summary
            html += `
                <div class="summary-card">
                    <h2>📊 Tổng Kết</h2>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="value">${metadata.total_days}</div>
                            <div class="label">Ngày</div>
                        </div>
                        <div class="summary-item">
                            <div class="value">${metadata.total_pois}</div>
                            <div class="label">Địa điểm</div>
                        </div>
                        <div class="summary-item">
                            <div class="value">${metadata.total_distance_km.toFixed(1)}</div>
                            <div class="label">km</div>
                        </div>
                        <div class="summary-item">
                            <div class="value">~${(metadata.total_distance_km * 2).toFixed(0)}</div>
                            <div class="label">phút di chuyển</div>
                        </div>
                    </div>
                    <button class="export-btn" onclick="exportHTML()">📄 Xuất File HTML</button>
                </div>
            `;
            
            container.innerHTML = html;
            container.classList.add('show');
        }
        
        async function exportHTML() {
            try {
                const requestData = {
                    city: document.getElementById('city').value,
                    days: parseInt(document.getElementById('days').value),
                    budget_vnd: parseInt(document.getElementById('budget').value),
                    walk_tolerance_km: parseFloat(document.getElementById('walk').value),
                    transport: document.getElementById('transport').value,
                    taste_tags: getSelectedTags('tasteTags'),
                    activity_tags: getSelectedTags('activityTags'),
                    include_images: true,
                    include_navigation: true
                };
                
                const response = await fetch(`${API_BASE}/api/itinerary/export/html`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const html = await response.text();
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `travel_package_${requestData.city}_${requestData.days}days.html`;
                a.click();
                URL.revokeObjectURL(url);
                
                alert('✅ File HTML đã được tải xuống!');
            } catch (error) {
                alert('❌ Lỗi khi xuất file: ' + error.message);
            }
        }
    </script>
</body>
</html>
